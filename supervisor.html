<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1F3864;--blue:#2E75B6;--bg:#0f1e35;--card:#162844;--border:#243a5e;--text:#e8edf5;--muted:#8aa0bd;--green:#4caf7d;--orange:#f59e0b;--red:#ef4444;--purple:#a78bfa;--row-alt:#111e33;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem;}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;}
  .brand{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  h1{font-size:1.5rem;font-weight:700;}
  .live-clock{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--blue);text-align:right;}
  .live-date{font-size:.75rem;color:var(--muted);text-align:right;margin-top:.2rem;}
  .controls{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .controls label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
  input[type="date"],input[type="text"]{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:.5rem .9rem;font-family:'Inter',sans-serif;font-size:.85rem;outline:none;}
  input[type="text"]{width:180px;}input[type="text"]::placeholder{color:var(--muted);}
  input:focus{border-color:var(--blue);}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:7px;padding:.5rem .9rem;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn:hover{opacity:.85;}.btn-green{background:var(--green);}
  .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;}
  .stat-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.4rem;}
  .stat-val{font-size:1.5rem;font-weight:700;}
  .green{color:var(--green)}.orange{color:var(--orange)}.red{color:var(--red)}.purple{color:var(--purple)}.smono{font-family:'JetBrains Mono',monospace;font-size:1.1rem;}
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:.875rem;}
  thead th{background:var(--navy);padding:.85rem 1rem;text-align:left;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}
  thead th:hover{color:var(--text);}
  thead th.sort-asc::after{content:' ↑';color:var(--blue);}thead th.sort-desc::after{content:' ↓';color:var(--blue);}
  tbody tr{border-bottom:1px solid var(--border);}tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(46,117,182,.07);}tbody tr:nth-child(even){background:var(--row-alt);}
  tbody tr:nth-child(even):hover{background:rgba(46,117,182,.07);}
  td{padding:.85rem 1rem;vertical-align:middle;}
  .agent-name{font-weight:600;}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.5rem;flex-shrink:0;}
  .dot-working{background:var(--green);box-shadow:0 0 6px var(--green);}
  .dot-on_break{background:var(--orange);box-shadow:0 0 6px var(--orange);}
  .dot-on_lunch{background:var(--purple);box-shadow:0 0 6px var(--purple);}
  .dot-clocked_out{background:var(--red);}.dot-not_clocked_in{background:var(--muted);}
  .status-text{font-size:.8rem;font-weight:500;display:flex;align-items:center;}
  .status-text.working{color:var(--green)}.status-text.on_break{color:var(--orange)}.status-text.on_lunch{color:var(--purple)}.status-text.clocked_out{color:var(--red)}.status-text.not_clocked_in{color:var(--muted);}
  .tmono{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:500;}
  .empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem;}
  .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;margin-right:.4rem;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .refresh-badge{font-size:.7rem;color:var(--muted);margin-left:auto;}
  .nav-links{margin-top:2rem;font-size:.78rem;color:var(--muted);display:flex;gap:1rem;}
  .nav-links a{color:var(--blue);text-decoration:none;}
</style>
</head>
<body>
<header>
  <div><div class="brand">GoAnswer · Time Clock</div><h1>Supervisor Dashboard</h1></div>
  <div><div class="live-clock" id="liveClock">--:--:--</div><div class="live-date" id="liveDate"></div></div>
</header>

<div class="controls">
  <label>Date</label>
  <input type="date" id="dateFilter">
  <button class="btn" onclick="goToday()">Today</button>
  <input type="text" id="searchFilter" placeholder="Filter by agent…">
  <button class="btn btn-green" onclick="exportCSV()">⬇ Export CSV</button>
  <span class="refresh-badge"><span class="pulse"></span>Live · updates every 5s</span>
</div>

<div class="stats-bar">
  <div class="stat-card"><div class="stat-label">Total Agents</div><div class="stat-val" id="statTotal">—</div></div>
  <div class="stat-card"><div class="stat-label">Working</div><div class="stat-val green" id="statWorking">—</div></div>
  <div class="stat-card"><div class="stat-label">On Break</div><div class="stat-val orange" id="statBreak">—</div></div>
  <div class="stat-card"><div class="stat-label">On Lunch</div><div class="stat-val purple" id="statLunch">—</div></div>
  <div class="stat-card"><div class="stat-label">Clocked Out</div><div class="stat-val red" id="statOut">—</div></div>
  <div class="stat-card"><div class="stat-label">Avg Work Time</div><div class="stat-val smono" id="statAvg">—</div></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('name')">Agent</th>
        <th onclick="sortBy('status')">Status</th>
        <th onclick="sortBy('work_seconds')">Work Time</th>
        <th onclick="sortBy('break_seconds')">Break Time</th>
        <th onclick="sortBy('lunch_seconds')">Lunch Time</th>
      </tr>
    </thead>
    <tbody id="tableBody"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody>
  </table>
</div>

<div class="nav-links">
  <span>Agent: <a href="agent.html">agent.html</a></span>
  <span>Developer: <a href="developer.html">developer.html</a></span>
</div>

<script>
  const SUPABASE_URL      = "https://fmnvpaynzcshcfyojvul.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbnZwYXluemNzaGNmeW9qdnVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDc5NjgsImV4cCI6MjA5NjY4Mzk2OH0.Ib9fgnWF9wOB2napqTUygrdIP0pIjNy9TVJMZrRDz64";
  const SB_HEADERS = {'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};

  const todayISO = new Date().toISOString().slice(0,10);
  let allAgents=[], sortCol='status', sortDir=1, isToday=true, liveHandle=null;

  // ─── 12hr clock ─────────────────────────────────────────────────────────────
  function tickClock(){
    const now=new Date();
    document.getElementById('liveClock').textContent=now.toLocaleTimeString('en-US',{hour12:true});
    document.getElementById('liveDate').textContent=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }
  tickClock(); setInterval(tickClock,1000);

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function fmtHMS(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),Math.floor(s%60)].map(v=>String(v).padStart(2,'0')).join(':');}

  document.getElementById('dateFilter').value=todayISO;
  document.getElementById('dateFilter').addEventListener('change',()=>{isToday=document.getElementById('dateFilter').value===todayISO;fetchData();});
  document.getElementById('searchFilter').addEventListener('input',()=>{updateStats();renderTable();});
  function goToday(){document.getElementById('dateFilter').value=todayISO;isToday=true;fetchData();}

  function computeTotals(events){
    let ws=0,bs=0,ls=0,status='not_clocked_in',ci=null,bst=null,lst=null;
    for(const ev of events){
      const ts=new Date(ev.timestamp);
      if(ev.event_type==='clock_in'){ci=ts;status='working';}
      else if(ev.event_type==='clock_out'){if(ci)ws+=(ts-ci)/1000;ci=null;status='clocked_out';}
      else if(ev.event_type==='break_start'){if(ci)ws+=(ts-ci)/1000;ci=null;bst=ts;status='on_break';}
      else if(ev.event_type==='break_end'){if(bst)bs+=(ts-bst)/1000;bst=null;ci=ts;status='working';}
      else if(ev.event_type==='lunch_start'){if(ci)ws+=(ts-ci)/1000;ci=null;lst=ts;status='on_lunch';}
      else if(ev.event_type==='lunch_end'){if(lst)ls+=(ts-lst)/1000;lst=null;ci=ts;status='working';}
    }
    const now=new Date();
    if(ci&&status==='working')ws+=(now-ci)/1000;
    if(bst&&status==='on_break')bs+=(now-bst)/1000;
    if(lst&&status==='on_lunch')ls+=(now-lst)/1000;
    return{work_seconds:Math.floor(ws),break_seconds:Math.floor(bs),lunch_seconds:Math.floor(ls),status};
  }

  async function fetchData(){
    const day=document.getElementById('dateFilter').value;
    try{
      const res=await fetch(SUPABASE_URL+'/rest/v1/events?event_date=eq.'+day+'&order=id.asc',{headers:SB_HEADERS});
      const events=await res.json();
      const byAgent={};
      for(const ev of events){if(!byAgent[ev.agent_name])byAgent[ev.agent_name]=[];byAgent[ev.agent_name].push(ev);}
      allAgents=Object.entries(byAgent).map(([name,evs])=>{
        const t=computeTotals(evs);
        return{name,...t,work_fmt:fmtHMS(t.work_seconds),break_fmt:fmtHMS(t.break_seconds),lunch_fmt:fmtHMS(t.lunch_seconds)};
      });
      if(isToday)startLiveTick();else stopLiveTick();
      updateStats();renderTable();
    }catch(e){
      document.getElementById('tableBody').innerHTML='<tr><td colspan="5" class="empty-state">Could not connect to Supabase.</td></tr>';
    }
  }

  function startLiveTick(){
    stopLiveTick();
    liveHandle=setInterval(()=>{
      allAgents.forEach(a=>{
        if(a.status==='working')a.work_seconds++;
        if(a.status==='on_break')a.break_seconds++;
        if(a.status==='on_lunch')a.lunch_seconds++;
        a.work_fmt=fmtHMS(a.work_seconds);a.break_fmt=fmtHMS(a.break_seconds);a.lunch_fmt=fmtHMS(a.lunch_seconds);
      });
      renderTimerCells();updateStats();
    },1000);
  }
  function stopLiveTick(){if(liveHandle){clearInterval(liveHandle);liveHandle=null;}}
  function renderTimerCells(){
    document.querySelectorAll('#tableBody tr[data-name]').forEach(row=>{
      const a=allAgents.find(x=>x.name===row.dataset.name);
      if(!a)return;
      row.querySelector('.cell-work').textContent=a.work_fmt;
      row.querySelector('.cell-break').textContent=a.break_fmt;
      row.querySelector('.cell-lunch').textContent=a.lunch_fmt;
    });
  }

  const STATUS_ORDER={working:0,on_break:1,on_lunch:2,clocked_out:3,not_clocked_in:4};
  const STATUS_LABELS={working:'Working',on_break:'On Break',on_lunch:'On Lunch',clocked_out:'Clocked Out',not_clocked_in:'Not Clocked In'};

  function getFiltered(){const q=document.getElementById('searchFilter').value.trim().toLowerCase();return allAgents.filter(a=>!q||a.name.toLowerCase().includes(q));}
  function getSorted(agents){return[...agents].sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(sortCol==='status'){va=STATUS_ORDER[va]??9;vb=STATUS_ORDER[vb]??9;}if(typeof va==='string')return sortDir*va.localeCompare(vb);return sortDir*(va-vb);});}
  function sortBy(col){sortDir=sortCol===col?sortDir*-1:1;sortCol=col;const cols=['name','status','work_seconds','break_seconds','lunch_seconds'];document.querySelectorAll('thead th').forEach((th,i)=>{th.classList.remove('sort-asc','sort-desc');if(cols[i]===col)th.classList.add(sortDir===1?'sort-asc':'sort-desc');});renderTable();}
  function updateStats(){
    const a=getFiltered();
    document.getElementById('statTotal').textContent=a.length;
    document.getElementById('statWorking').textContent=a.filter(x=>x.status==='working').length;
    document.getElementById('statBreak').textContent=a.filter(x=>x.status==='on_break').length;
    document.getElementById('statLunch').textContent=a.filter(x=>x.status==='on_lunch').length;
    document.getElementById('statOut').textContent=a.filter(x=>x.status==='clocked_out').length;
    const avg=a.length?a.reduce((s,x)=>s+x.work_seconds,0)/a.length:0;
    document.getElementById('statAvg').textContent=a.length?fmtHMS(Math.floor(avg)):'—';
  }
  function renderTable(){
    const agents=getSorted(getFiltered());
    const tbody=document.getElementById('tableBody');
    if(!agents.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state">No agents found.</td></tr>';return;}
    tbody.innerHTML=agents.map(a=>'<tr data-name="'+a.name+'"><td class="agent-name">'+a.name+'</td><td><span class="status-text '+a.status+'"><span class="status-dot dot-'+a.status+'"></span>'+(STATUS_LABELS[a.status]||a.status)+'</span></td><td><span class="tmono cell-work">'+a.work_fmt+'</span></td><td><span class="tmono cell-break">'+a.break_fmt+'</span></td><td><span class="tmono cell-lunch">'+a.lunch_fmt+'</span></td></tr>').join('');
  }

  function exportCSV(){
    const day=document.getElementById('dateFilter').value;
    const agents=getSorted(getFiltered());
    const rows=[['Agent','Status','Work Time','Break Time','Lunch Time']];
    agents.forEach(a=>rows.push([a.name,STATUS_LABELS[a.status]||a.status,a.work_fmt,a.break_fmt,a.lunch_fmt]));
    const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url;link.download='timereport_'+day+'.csv';link.click();
    URL.revokeObjectURL(url);
  }

  fetchData();
  setInterval(fetchData,5000);
</script>
</body>
</html>
