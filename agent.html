<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Clock – Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1F3864;--blue:#2E75B6;--bg:#0f1e35;--card:#162844;--border:#243a5e;--text:#e8edf5;--muted:#8aa0bd;--green:#4caf7d;--orange:#f59e0b;--red:#ef4444;--purple:#a78bfa;--teal:#2dd4bf;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .brand{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
  h1{font-size:1.6rem;font-weight:700;margin-bottom:2rem;}
  .layout{display:flex;gap:1.5rem;align-items:flex-start;width:100%;max-width:820px;flex-wrap:wrap;justify-content:center;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:400px;}
  .card-log{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:340px;}
  label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;}
  input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:.1rem;}
  input:focus{border-color:var(--blue);}
  .input-group{margin-bottom:1.1rem;}
  .auth-box{display:none;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:400px;}
  .auth-box.active{display:block;}
  .auth-title{font-size:1rem;font-weight:700;margin-bottom:.3rem;}
  .auth-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.25rem;}
  .tab-row{display:flex;gap:.5rem;margin-bottom:1.5rem;}
  .tab{flex:1;padding:.6rem;border:1px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .status-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1.5rem;}
  .greeting{font-size:1.1rem;font-weight:600;margin-bottom:.75rem;}
  .status-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem;}
  .status-pill{display:inline-block;padding:.25rem .9rem;border-radius:999px;font-size:.8rem;font-weight:600;margin-bottom:1rem;}
  .pill-working{background:rgba(76,175,125,.15);color:var(--green);border:1px solid var(--green);}
  .pill-on_break{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid var(--orange);}
  .pill-on_lunch{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid var(--purple);}
  .pill-on_restroom{background:rgba(45,212,191,.15);color:var(--teal);border:1px solid var(--teal);}
  .pill-clocked_out{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red);}
  .pill-not_clocked_in{background:rgba(138,160,189,.1);color:var(--muted);border:1px solid var(--border);}
  .timers{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  .timer-block .tl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem;}
  .timer-block .tv{font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:700;}
  .tv-work{color:var(--green);}.tv-break{color:var(--orange);}.tv-lunch{color:var(--purple);}.tv-restroom{color:var(--teal);}
  .actions{display:flex;flex-direction:column;gap:.75rem;margin-top:1rem;}
  .btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;}
  .btn-row-2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
  button.action-btn{width:100%;padding:.8rem 1rem;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;}
  button.action-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px);}
  button.action-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:.8rem;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:.5rem;}
  .btn-primary:hover{opacity:.88;}
  .btn-green{background:var(--green);color:#fff;}.btn-red{background:var(--red);color:#fff;}
  .btn-orange{background:var(--orange);color:#fff;}.btn-purple{background:var(--purple);color:#fff;}.btn-teal{background:var(--teal);color:#fff;}
  .btn-full{grid-column:span 2;}
  .divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
  .clock-live{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted);text-align:center;margin-top:1.5rem;}
  #msg,#authMsg{font-size:.82rem;margin-top:.5rem;min-height:1.2em;}
  .spinner{display:none;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin:.5rem auto 0;}
  .spinner.show{display:block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .log-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
  .log-empty{color:var(--muted);font-size:.82rem;text-align:center;padding:1rem 0;}
  .log-item{display:flex;align-items:flex-start;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--border);}
  .log-item:last-child{border-bottom:none;}
  .log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .log-type{font-size:.78rem;font-weight:600;}.log-time{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.15rem;}
  .ld-clock_in{background:var(--green);}.ld-clock_out{background:var(--red);}
  .ld-break_start,.ld-break_end{background:var(--orange);}
  .ld-lunch_start,.ld-lunch_end{background:var(--purple);}
  .lt-clock_in{color:var(--green);}.lt-clock_out{color:var(--red);}
  .lt-break_start,.lt-break_end{color:var(--orange);}
  .lt-lunch_start,.lt-lunch_end{color:var(--purple);}
  .ld-restroom_start,.ld-restroom_end{background:var(--teal);}
  .lt-restroom_start,.lt-restroom_end{color:var(--teal);}
</style>
</head>
<body>
<div class="brand">GoAnswer · Time Clock</div>
<h1>Agent Portal</h1>

<div class="auth-box active" id="authScreen">
  <div class="tab-row">
    <button class="tab active" onclick="showTab('login')">Sign In</button>
    <button class="tab" onclick="showTab('register')">Register</button>
  </div>
  <div id="loginForm">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in with your GoAnswer email</div>
    <div class="input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@goanswer.io"></div>
    <div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
  </div>
  <div id="registerForm" style="display:none">
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Use your @goanswer.io email to register</div>
    <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@goanswer.io"></div>
    <div class="input-group"><label>Password</label><input type="password" id="regPassword" placeholder="Choose a password"></div>
    <div class="input-group"><label>Confirm Password</label><input type="password" id="regConfirm" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <button class="btn-primary" onclick="doRegister()">Create Account</button>
  </div>
  <div class="spinner" id="authSpinner"></div>
  <div id="authMsg"></div>
</div>

<div class="layout" id="mainScreen" style="display:none">
  <div class="card">
    <div class="status-box" id="statusBox">
      <div class="greeting" id="greeting"></div>
      <div class="status-label">Current Status</div>
      <span class="status-pill" id="statusPill">—</span>
      <div class="timers">
        <div class="timer-block"><div class="tl">Work Time</div><div class="tv tv-work" id="workTimer">00:00:00</div></div>
        <div class="timer-block"><div class="tl">Break</div><div class="tv tv-break" id="breakTimer">00:00:00</div></div>
        <div class="timer-block"><div class="tl">Lunch</div><div class="tv tv-lunch" id="lunchTimer">00:00:00</div></div>
        <div class="timer-block"><div class="tl">Restroom</div><div class="tv tv-restroom" id="restroomTimer">00:00:00</div></div>
      </div>
      <hr class="divider">
      <div class="actions" id="actionButtons"></div>
    </div>
    <div class="spinner" id="spinner"></div>
    <div id="msg"></div>
    <div class="clock-live" id="liveClock"></div>
  </div>
  <div class="card-log" id="logCard" style="display:none">
    <div class="log-title">Today's Activity Log</div>
    <div id="logList"><div class="log-empty">No events yet.</div></div>
  </div>
</div>

<script>
  const SUPABASE_URL      = "https://fmnvpaynzcshcfyojvul.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbnZwYXluemNzaGNmeW9qdnVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDc5NjgsImV4cCI6MjA5NjY4Mzk2OH0.Ib9fgnWF9wOB2napqTUygrdIP0pIjNy9TVJMZrRDz64";
  const SB = {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};

  function bzNow()   { return new Date(Date.now()-6*3600000); }
  function todayBZ() { return bzNow().toISOString().slice(0,10); }
  function nowUTC()  { return new Date().toISOString().replace('T',' ').slice(0,19); }
  function fmt12(utcStr) {
    const d=new Date(utcStr.replace(' ','T')+'Z');
    const bz=new Date(d.getTime()-6*3600000);
    let h=bz.getUTCHours(),m=bz.getUTCMinutes(),s=bz.getUTCSeconds();
    const ap=h>=12?'PM':'AM'; h=h%12||12;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' '+ap;
  }
  function fmtHMS(s){s=Math.max(0,Math.floor(s));return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');}
  function nameFromEmail(e){return e.split('@')[0].split('.').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(' ');}
  function showTab(t){
    document.getElementById('loginForm').style.display=t==='login'?'block':'none';
    document.getElementById('registerForm').style.display=t==='register'?'block':'none';
    document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1)));
    setAuthMsg('');
  }
  function setAuthMsg(txt,err=true){const el=document.getElementById('authMsg');el.style.color=err?'var(--red)':'var(--green)';el.textContent=txt;}
  function setAuthSpinner(on){document.getElementById('authSpinner').classList.toggle('show',on);}
  function showMsg(txt,err=true){const el=document.getElementById('msg');el.style.color=err?'var(--red)':'var(--green)';el.textContent=txt;}
  function setSpinner(on){document.getElementById('spinner').classList.toggle('show',on);}

  async function sbGet(table,params=''){const res=await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+params,{headers:SB});return res.json();}
  async function sbPost(table,body){const res=await fetch(SUPABASE_URL+'/rest/v1/'+table,{method:'POST',headers:{...SB,'Prefer':'return=minimal'},body:JSON.stringify(body)});return res.ok;}

  async function doRegister(){
    const email=document.getElementById('regEmail').value.trim().toLowerCase();
    const password=document.getElementById('regPassword').value;
    const confirm=document.getElementById('regConfirm').value;
    if(!email.endsWith('@goanswer.io')){setAuthMsg('Must use a @goanswer.io email.');return;}
    if(password.length<4){setAuthMsg('Password must be at least 4 characters.');return;}
    if(password!==confirm){setAuthMsg('Passwords do not match.');return;}
    setAuthSpinner(true);setAuthMsg('');
    try{
      const existing=await sbGet('agents','email=eq.'+encodeURIComponent(email));
      if(existing&&existing.length>0){setAuthMsg('An account with this email already exists.');return;}
      const name=nameFromEmail(email);
      const ok=await sbPost('agents',{email,name,password,created_at:nowUTC()});
      if(!ok){setAuthMsg('Registration failed. Try again.');return;}
      saveSession(email,name);showClock(name);
    }catch(e){setAuthMsg('Connection error: '+e.message);}
    finally{setAuthSpinner(false);}
  }

  async function doLogin(){
    const email=document.getElementById('loginEmail').value.trim().toLowerCase();
    const password=document.getElementById('loginPassword').value;
    if(!email.endsWith('@goanswer.io')){setAuthMsg('Must use a @goanswer.io email.');return;}
    if(!password){setAuthMsg('Enter your password.');return;}
    setAuthSpinner(true);setAuthMsg('');
    try{
      const rows=await sbGet('agents','email=eq.'+encodeURIComponent(email)+'&password=eq.'+encodeURIComponent(password));
      if(!rows||rows.length===0){setAuthMsg('Incorrect email or password.');return;}
      saveSession(rows[0].email,rows[0].name);showClock(rows[0].name);
    }catch(e){setAuthMsg('Connection error: '+e.message);}
    finally{setAuthSpinner(false);}
  }

  function saveSession(email,name){localStorage.setItem('tc_email',email);localStorage.setItem('tc_name',name);localStorage.setItem('tc_day',todayBZ());}

  function showClock(name){
    document.getElementById('authScreen').style.display='none';
    document.getElementById('mainScreen').style.display='flex';
    document.getElementById('greeting').textContent='Welcome, '+name;
    loadStatus(name);
  }

  let state=null,ticker=null,tickBase={w:0,b:0,l:0},tickStart=null;

  function computeTotals(events){
    let ws=0,bs=0,ls=0,rs=0,status='not_clocked_in',ci=null,bst=null,lst=null,rst=null;
    for(const ev of events){
      const ts=new Date(ev.timestamp.replace(' ','T')+'Z');
      if(ev.event_type==='clock_in'){ci=ts;status='working';}
      else if(ev.event_type==='clock_out'){if(ci)ws+=(ts-ci)/1000;ci=null;status='clocked_out';}
      else if(ev.event_type==='break_start'){if(ci)ws+=(ts-ci)/1000;ci=null;bst=ts;status='on_break';}
      else if(ev.event_type==='break_end'){if(bst)bs+=(ts-bst)/1000;bst=null;ci=ts;status='working';}
      else if(ev.event_type==='lunch_start'){if(ci)ws+=(ts-ci)/1000;ci=null;lst=ts;status='on_lunch';}
      else if(ev.event_type==='lunch_end'){if(lst)ls+=(ts-lst)/1000;lst=null;ci=ts;status='working';}
    }
    const now=new Date();
    if(ci&&status==='working')ws+=Math.max(0,(now-ci)/1000);
    if(bst&&status==='on_break')bs+=Math.max(0,(now-bst)/1000);
    if(lst&&status==='on_lunch')ls+=Math.max(0,(now-lst)/1000);
    return{work_seconds:Math.max(0,Math.floor(ws)),break_seconds:Math.max(0,Math.floor(bs)),lunch_seconds:Math.max(0,Math.floor(ls)),status};
  }

  async function loadStatus(name){
    setSpinner(true);
    try{
      const events=await sbGet('events','agent_name=eq.'+encodeURIComponent(name)+'&event_date=eq.'+todayBZ()+'&order=id.asc');
      const totals=computeTotals(events||[]);
      applyState({name,events:events||[],...totals});
    }catch(e){showMsg('Connection error.');}
    finally{setSpinner(false);}
  }

  const STATUS_LABELS={working:'Working',on_break:'On Break',on_lunch:'On Lunch',on_restroom:'Restroom',clocked_out:'Clocked Out',not_clocked_in:'Not Clocked In'};
  const LOG_LABELS={clock_in:'Clocked In',clock_out:'Clocked Out',break_start:'Break Started',break_end:'Break Ended',lunch_start:'Lunch Started',lunch_end:'Lunch Ended',restroom_start:'Restroom Started',restroom_end:'Restroom Ended'};

  function applyState(data){
    state=data;
    if(ticker)clearInterval(ticker);
    tickBase={w:data.work_seconds,b:data.break_seconds,l:data.lunch_seconds,r:data.restroom_seconds||0};
    tickStart=Date.now();
    const pill=document.getElementById('statusPill');
    pill.textContent=STATUS_LABELS[data.status]||data.status;
    pill.className='status-pill pill-'+data.status;
    updateTimers();renderButtons(data.status);renderLog(data.events);
    if(['working','on_break','on_lunch'].includes(data.status))
      ticker=setInterval(updateTimers,1000);
  }

  function updateTimers(){
    if(!state)return;
    const el=Math.floor((Date.now()-tickStart)/1000);
    document.getElementById('workTimer').textContent    =fmtHMS(tickBase.w+(state.status==='working'    ?el:0));
    document.getElementById('breakTimer').textContent   =fmtHMS(tickBase.b+(state.status==='on_break'   ?el:0));
    document.getElementById('lunchTimer').textContent   =fmtHMS(tickBase.l+(state.status==='on_lunch'   ?el:0));
    document.getElementById('restroomTimer').textContent=fmtHMS(tickBase.r+(state.status==='on_restroom'?el:0));
  }

  function mkBtn(label,cls,action){
    const b=document.createElement('button');
    b.className='action-btn '+cls;
    b.style.width='100%';
    b.textContent=label;b.onclick=()=>doAction(action);return b;
  }
  function renderButtons(status){
    const c=document.getElementById('actionButtons');
    c.innerHTML='';
    c.style.cssText='display:flex;flex-direction:column;gap:.75rem;margin-top:1rem;';
    if(status==='not_clocked_in'||status==='clocked_out'){
      const b=mkBtn('Clock In','btn-green','clock_in');
      b.style.width='100%';c.appendChild(b);
    } else if(status==='working'){
      const row=document.createElement('div');
      row.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;';
      row.appendChild(mkBtn('Break','btn-orange','break_start'));
      row.appendChild(mkBtn('Lunch','btn-purple','lunch_start'));
      row.appendChild(mkBtn('Restroom','btn-teal','restroom_start'));
      c.appendChild(row);
      const co=mkBtn('Clock Out','btn-red','clock_out');
      co.style.cssText='width:100%;display:block;';
      c.appendChild(co);
    } else if(status==='on_break'){
      const b=mkBtn('End Break','btn-green','break_end');
      b.style.width='100%';c.appendChild(b);
    } else if(status==='on_lunch'){
      const b=mkBtn('End Lunch','btn-purple','lunch_end');
      b.style.width='100%';c.appendChild(b);
    } else if(status==='on_restroom'){
      const b=mkBtn('End Restroom','btn-teal','restroom_end');
      b.style.width='100%';c.appendChild(b);
    }
  }
  function renderLog(events){
    const card=document.getElementById('logCard'),list=document.getElementById('logList');
    if(!events||!events.length){card.style.display='none';return;}
    card.style.display='block';
    list.innerHTML=[...events].reverse().map(e=>`<div class="log-item"><span class="log-dot ld-${e.event_type}"></span><div><div class="log-type lt-${e.event_type}">${LOG_LABELS[e.event_type]||e.event_type}</div><div class="log-time">${fmt12(e.timestamp)}</div></div></div>`).join('');
  }

  async function doAction(action){
    const name=localStorage.getItem('tc_name');
    setSpinner(true);
    document.querySelectorAll('#actionButtons button').forEach(b=>b.disabled=true);
    try{
      const ok=await sbPost('events',{agent_name:name,event_type:action,timestamp:nowUTC(),event_date:todayBZ()});
      if(!ok){showMsg('Failed to save.');return;}
      await loadStatus(name);
    }catch(e){showMsg('Connection error.');}
    finally{setSpinner(false);}
  }

  function tickClock(){
    const bz=bzNow();
    let h=bz.getUTCHours(),m=bz.getUTCMinutes(),s=bz.getUTCSeconds();
    const ap=h>=12?'PM':'AM';h=h%12||12;
    document.getElementById('liveClock').textContent=
      bz.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'UTC'})
      +'  ·  '+String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' '+ap;
  }
  tickClock();setInterval(tickClock,1000);

  // Daily reset
  setInterval(()=>{
    const savedDay=localStorage.getItem('tc_day');
    if(savedDay&&savedDay!==todayBZ()){
      if(ticker)clearInterval(ticker);state=null;
      const name=localStorage.getItem('tc_name');
      localStorage.setItem('tc_day',todayBZ());
      if(name)loadStatus(name);
    }
  },30000);

  // Auto-login
  const savedEmail=localStorage.getItem('tc_email');
  const savedName=localStorage.getItem('tc_name');
  if(savedEmail&&savedName)showClock(savedName);
</script>
</body>
</html>
