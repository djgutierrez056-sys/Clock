<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Clock – Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1F3864;--blue:#2E75B6;--bg:#0f1e35;--card:#162844;--border:#243a5e;--text:#e8edf5;--muted:#8aa0bd;--green:#4caf7d;--orange:#f59e0b;--red:#ef4444;--purple:#a78bfa;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .brand{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
  h1{font-size:1.6rem;font-weight:700;margin-bottom:2rem;}
  .layout{display:flex;gap:1.5rem;align-items:flex-start;width:100%;max-width:820px;flex-wrap:wrap;justify-content:center;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:400px;}
  .card-log{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:100%;max-width:340px;}
  label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem;}
  input[type="email"],input[type="text"]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;color:var(--text);font-family:'Inter',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;}
  input[type="email"]:focus,input[type="text"]:focus{border-color:var(--blue);}
  input[type="email"].error{border-color:var(--red);}
  .input-group{margin-bottom:1.25rem;}
  .email-hint{font-size:.72rem;color:var(--muted);margin-top:.35rem;}
  .status-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1.5rem;display:none;}
  .status-box.visible{display:block;}
  .greeting{font-size:1.1rem;font-weight:600;margin-bottom:.25rem;}
  .greeting-email{font-size:.75rem;color:var(--muted);margin-bottom:.75rem;}
  .status-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.4rem;}
  .status-pill{display:inline-block;padding:.25rem .9rem;border-radius:999px;font-size:.8rem;font-weight:600;margin-bottom:1rem;}
  .pill-working{background:rgba(76,175,125,.15);color:var(--green);border:1px solid var(--green);}
  .pill-on_break{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid var(--orange);}
  .pill-on_lunch{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid var(--purple);}
  .pill-clocked_out{background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red);}
  .pill-not_clocked_in{background:rgba(138,160,189,.1);color:var(--muted);border:1px solid var(--border);}
  .timers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;}
  .timer-block .tl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem;}
  .timer-block .tv{font-family:'JetBrains Mono',monospace;font-size:1.15rem;font-weight:700;}
  .tv-work{color:var(--green);}.tv-break{color:var(--orange);}.tv-lunch{color:var(--purple);}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem;}
  button{width:100%;padding:.8rem 1rem;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;}
  button:hover:not(:disabled){opacity:.88;transform:translateY(-1px);}
  button:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn-load{background:var(--navy);color:var(--text);grid-column:span 2;border:1px solid var(--border);}
  .btn-green{background:var(--green);color:#fff;}.btn-red{background:var(--red);color:#fff;}
  .btn-orange{background:var(--orange);color:#fff;}.btn-purple{background:var(--purple);color:#fff;}
  .btn-full{grid-column:span 2;}
  .btn-logout{width:auto;padding:.4rem .9rem;font-size:.75rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;margin-bottom:1rem;cursor:pointer;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}
  .divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
  .clock-live{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted);text-align:center;margin-top:1.5rem;}
  #msg{font-size:.82rem;margin-top:.5rem;min-height:1.2em;}
  .spinner{display:none;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin:.5rem auto 0;}
  .spinner.show{display:block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .log-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
  .log-empty{color:var(--muted);font-size:.82rem;text-align:center;padding:1rem 0;}
  .log-item{display:flex;align-items:flex-start;gap:.75rem;padding:.55rem 0;border-bottom:1px solid var(--border);}
  .log-item:last-child{border-bottom:none;}
  .log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .log-type{font-size:.78rem;font-weight:600;}.log-time{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.15rem;}
  .ld-clock_in{background:var(--green);}.ld-clock_out{background:var(--red);}
  .ld-break_start,.ld-break_end{background:var(--orange);}
  .ld-lunch_start,.ld-lunch_end{background:var(--purple);}
  .lt-clock_in{color:var(--green);}.lt-clock_out{color:var(--red);}
  .lt-break_start,.lt-break_end{color:var(--orange);}
  .lt-lunch_start,.lt-lunch_end{color:var(--purple);}
  .nav-links{margin-top:2rem;display:flex;gap:1rem;font-size:.78rem;color:var(--muted);}
  .nav-links a{color:var(--blue);text-decoration:none;}

  /* Login screen */
  #loginSection{width:100%;max-width:400px;}
  .login-title{font-size:1rem;font-weight:600;margin-bottom:1.5rem;}
  .lock-icon{font-size:2rem;margin-bottom:1rem;display:block;text-align:center;}
</style>
</head>
<body>
<div class="brand">GoAnswer · Time Clock</div>
<h1>Agent Portal</h1>

<!-- LOGIN SECTION -->
<div id="loginSection">
  <div class="card">
    <span class="lock-icon">🔒</span>
    <div class="login-title" style="text-align:center">Sign in with your GoAnswer email</div>
    <div class="input-group">
      <label for="emailInput">Work Email</label>
      <input type="email" id="emailInput" placeholder="yourname@goanswer.io" autocomplete="email" autocapitalize="off">
      <div class="email-hint">Must be a @goanswer.io address</div>
    </div>
    <div class="actions">
      <button class="btn-load" onclick="doLogin()">Sign In</button>
    </div>
    <div id="loginMsg" style="font-size:.82rem;margin-top:.75rem;min-height:1.2em;color:var(--red);text-align:center;"></div>
  </div>
</div>

<!-- MAIN PORTAL (hidden until login) -->
<div id="portalSection" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;">
  <div class="layout">
    <div class="card">
      <button class="btn-logout" onclick="doLogout()">⇠ Sign Out</button>
      <div class="spinner" id="spinner"></div>
      <div id="msg"></div>
      <div class="status-box" id="statusBox">
        <div class="greeting" id="greeting"></div>
        <div class="greeting-email" id="greetingEmail"></div>
        <div class="status-label">Current Status</div>
        <span class="status-pill" id="statusPill">—</span>
        <div class="timers">
          <div class="timer-block"><div class="tl">Work Time</div><div class="tv tv-work" id="workTimer">00:00:00</div></div>
          <div class="timer-block"><div class="tl">Break</div><div class="tv tv-break" id="breakTimer">00:00:00</div></div>
          <div class="timer-block"><div class="tl">Lunch</div><div class="tv tv-lunch" id="lunchTimer">00:00:00</div></div>
        </div>
        <hr class="divider">
        <div class="actions" id="actionButtons"></div>
      </div>
      <div class="clock-live" id="liveClock"></div>
    </div>
    <div class="card-log" id="logCard" style="display:none">
      <div class="log-title">Today's Activity Log</div>
      <div id="logList"><div class="log-empty">No events yet.</div></div>
    </div>
  </div>
</div>

<div class="nav-links">
  <span>Supervisor: <a href="supervisor.html">supervisor.html</a></span>
  <span>Developer: <a href="developer.html">developer.html</a></span>
</div>

<script>
  const SUPABASE_URL      = "https://fmnvpaynzcshcfyojvul.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtbnZwYXluemNzaGNmeW9qdnVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDc5NjgsImV4cCI6MjA5NjY4Mzk2OH0.Ib9fgnWF9wOB2napqTUygrdIP0pIjNy9TVJMZrRDz64";
  const SB_HEADERS = {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};

  let state=null, workSec=0, breakSec=0, lunchSec=0, ticker=null;
  let currentEmail='', currentName='', sessionDate='';

  // ─── Date / time helpers ────────────────────────────────────────────────────
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function nowStr()  { return new Date().toISOString().replace('T',' ').slice(0,19); }
  function fmtHMS(s) { return [Math.floor(s/3600),Math.floor((s%3600)/60),Math.floor(s%60)].map(v=>String(v).padStart(2,'0')).join(':'); }

  // Convert a raw timestamp string "HH:MM:SS" to 12-hr format
  function to12hr(timeStr){
    const [h,m,s]=timeStr.split(':').map(Number);
    const ampm=h<12?'AM':'PM';
    const h12=h%12||12;
    return String(h12).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' '+ampm;
  }

  // ─── Email → Display name ────────────────────────────────────────────────────
  function emailToName(email){
    // "jonathan.gutierrez@goanswer.io" → "Jonathan Gutierrez"
    const local = email.split('@')[0];
    return local.replace(/[._-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }

  // ─── Session helpers (localStorage) ─────────────────────────────────────────
  function saveSession(email){
    localStorage.setItem('ga_agent_email', email);
    localStorage.setItem('ga_session_date', todayStr());
  }
  function clearSession(){
    localStorage.removeItem('ga_agent_email');
    localStorage.removeItem('ga_session_date');
  }
  function loadSession(){
    const email=localStorage.getItem('ga_agent_email');
    const date =localStorage.getItem('ga_session_date');
    if(!email) return null;
    // If the stored date is not today, wipe it so the UI resets fresh each day
    if(date !== todayStr()){
      clearSession();
      return null;
    }
    return email;
  }

  // ─── UI visibility ───────────────────────────────────────────────────────────
  function showPortal(){
    document.getElementById('loginSection').style.display='none';
    const p=document.getElementById('portalSection');
    p.style.display='flex';
  }
  function showLogin(){
    document.getElementById('loginSection').style.display='block';
    const p=document.getElementById('portalSection');
    p.style.display='none';
  }

  // ─── Login / Logout ──────────────────────────────────────────────────────────
  function doLogin(){
    const raw=document.getElementById('emailInput').value.trim().toLowerCase();
    const emailEl=document.getElementById('emailInput');
    const msgEl=document.getElementById('loginMsg');

    if(!raw){msgEl.textContent='Please enter your email.';emailEl.classList.add('error');return;}
    if(!raw.endsWith('@goanswer.io')){
      msgEl.textContent='Only @goanswer.io emails are allowed.';
      emailEl.classList.add('error');
      return;
    }
    emailEl.classList.remove('error');
    msgEl.textContent='';
    currentEmail=raw;
    currentName=emailToName(raw);
    saveSession(raw);
    showPortal();
    loadStatus();
  }

  function doLogout(){
    clearSession();
    currentEmail='';
    currentName='';
    if(ticker){clearInterval(ticker);ticker=null;}
    document.getElementById('statusBox').classList.remove('visible');
    document.getElementById('logCard').style.display='none';
    document.getElementById('emailInput').value='';
    showLogin();
  }

  // ─── Status loading ──────────────────────────────────────────────────────────
  function showMsg(txt,err=true){const el=document.getElementById('msg');el.style.color=err?'var(--red)':'var(--green)';el.textContent=txt;}
  function setSpinner(on){document.getElementById('spinner').classList.toggle('show',on);}

  async function sbGet(params){
    const res=await fetch(SUPABASE_URL+'/rest/v1/events?'+params,{headers:SB_HEADERS});
    return res.json();
  }
  async function sbPost(body){
    const res=await fetch(SUPABASE_URL+'/rest/v1/events',{
      method:'POST',headers:{...SB_HEADERS,'Prefer':'return=minimal'},
      body:JSON.stringify(body)
    });
    return res.ok;
  }

  function computeTotals(events){
    let ws=0,bs=0,ls=0,status='not_clocked_in',ci=null,bst=null,lst=null;
    for(const ev of events){
      const ts=new Date(ev.timestamp);
      if     (ev.event_type==='clock_in')   {ci=ts;status='working';}
      else if(ev.event_type==='clock_out')  {if(ci)ws+=(ts-ci)/1000;ci=null;status='clocked_out';}
      else if(ev.event_type==='break_start'){if(ci)ws+=(ts-ci)/1000;ci=null;bst=ts;status='on_break';}
      else if(ev.event_type==='break_end')  {if(bst)bs+=(ts-bst)/1000;bst=null;ci=ts;status='working';}
      else if(ev.event_type==='lunch_start'){if(ci)ws+=(ts-ci)/1000;ci=null;lst=ts;status='on_lunch';}
      else if(ev.event_type==='lunch_end')  {if(lst)ls+=(ts-lst)/1000;lst=null;ci=ts;status='working';}
    }
    const now=new Date();
    if(ci&&status==='working')  ws+=(now-ci)/1000;
    if(bst&&status==='on_break')bs+=(now-bst)/1000;
    if(lst&&status==='on_lunch')ls+=(now-lst)/1000;
    return{work_seconds:Math.floor(ws),break_seconds:Math.floor(bs),lunch_seconds:Math.floor(ls),status};
  }

  async function loadStatus(){
    showMsg('');setSpinner(true);
    try{
      const events=await sbGet('agent_name=eq.'+encodeURIComponent(currentName)+'&event_date=eq.'+todayStr()+'&order=id.asc');
      const totals=computeTotals(events||[]);
      applyState({name:currentName,email:currentEmail,events:events||[],...totals});
    }catch(e){showMsg('Connection error: '+e.message);}
    finally{setSpinner(false);}
  }

  const STATUS_LABELS={working:'Working',on_break:'On Break',on_lunch:'On Lunch',clocked_out:'Clocked Out',not_clocked_in:'Not Clocked In'};
  const LOG_LABELS={clock_in:'Clocked In',clock_out:'Clocked Out',break_start:'Break Started',break_end:'Break Ended',lunch_start:'Lunch Started',lunch_end:'Lunch Ended'};

  function applyState(data){
    state=data;workSec=data.work_seconds;breakSec=data.break_seconds;lunchSec=data.lunch_seconds;
    document.getElementById('statusBox').classList.add('visible');
    document.getElementById('greeting').textContent='Welcome, '+data.name;
    document.getElementById('greetingEmail').textContent=data.email;
    const pill=document.getElementById('statusPill');
    pill.textContent=STATUS_LABELS[data.status]||data.status;
    pill.className='status-pill pill-'+data.status;
    document.getElementById('workTimer').textContent=fmtHMS(workSec);
    document.getElementById('breakTimer').textContent=fmtHMS(breakSec);
    document.getElementById('lunchTimer').textContent=fmtHMS(lunchSec);
    renderButtons(data.status);
    renderLog(data.events);
    if(ticker)clearInterval(ticker);
    if(['working','on_break','on_lunch'].includes(data.status))
      ticker=setInterval(tickTimers,1000);
  }

  function tickTimers(){
    if(!state)return;
    if(state.status==='working')  workSec++;
    if(state.status==='on_break') breakSec++;
    if(state.status==='on_lunch') lunchSec++;
    document.getElementById('workTimer').textContent=fmtHMS(workSec);
    document.getElementById('breakTimer').textContent=fmtHMS(breakSec);
    document.getElementById('lunchTimer').textContent=fmtHMS(lunchSec);
  }

  function mkBtn(label,cls,action,full=false){
    const b=document.createElement('button');
    b.className=cls+(full?' btn-full':'');
    b.textContent=label;
    b.onclick=()=>doAction(action);
    return b;
  }

  function renderButtons(status){
    const c=document.getElementById('actionButtons');c.innerHTML='';
    if(status==='not_clocked_in'||status==='clocked_out'){
      c.appendChild(mkBtn('Clock In','btn-green','clock_in',true));
    }else if(status==='working'){
      c.appendChild(mkBtn('Start Break','btn-orange','break_start'));
      c.appendChild(mkBtn('Lunch',      'btn-purple','lunch_start'));
      c.appendChild(mkBtn('Clock Out',  'btn-red',   'clock_out',true));
    }else if(status==='on_break'){
      c.appendChild(mkBtn('End Break','btn-green','break_end',true));
    }else if(status==='on_lunch'){
      c.appendChild(mkBtn('End Lunch','btn-purple','lunch_end',true));
    }
  }

  function renderLog(events){
    const card=document.getElementById('logCard');
    const list=document.getElementById('logList');
    if(!events||!events.length){card.style.display='none';return;}
    card.style.display='block';
    list.innerHTML=[...events].reverse().map(e=>{
      const rawTime=e.timestamp.slice(11,19);
      const display=to12hr(rawTime);
      return '<div class="log-item"><span class="log-dot ld-'+e.event_type+'"></span><div><div class="log-type lt-'+e.event_type+'">'+(LOG_LABELS[e.event_type]||e.event_type)+'</div><div class="log-time">'+display+'</div></div></div>';
    }).join('');
  }

  async function doAction(action){
    setSpinner(true);
    document.querySelectorAll('#actionButtons button').forEach(b=>b.disabled=true);
    try{
      const ok=await sbPost({agent_name:currentName,event_type:action,timestamp:nowStr(),event_date:todayStr()});
      if(!ok){showMsg('Failed to save. Try again.');return;}
      await loadStatus();
    }catch(e){showMsg('Connection error.');}
    finally{setSpinner(false);}
  }

  // ─── Live clock (12-hr) ───────────────────────────────────────────────────────
  function tickClock(){
    const now=new Date();
    document.getElementById('liveClock').textContent=
      now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
      +'  ·  '+now.toLocaleTimeString('en-US',{hour12:true});
  }
  tickClock();setInterval(tickClock,1000);

  // ─── Midnight reset ───────────────────────────────────────────────────────────
  // If the stored session is from a previous day, force logout/reset
  function scheduleMidnightReset(){
    const now=new Date();
    const msUntilMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now;
    setTimeout(()=>{
      // Day rolled over — reset the UI
      doLogout();
      document.getElementById('loginMsg').textContent='';
      scheduleMidnightReset(); // schedule again for next midnight
    }, msUntilMidnight+500);
  }
  scheduleMidnightReset();

  // ─── Boot ────────────────────────────────────────────────────────────────────
  (function init(){
    const savedEmail=loadSession();
    if(savedEmail){
      currentEmail=savedEmail;
      currentName=emailToName(savedEmail);
      document.getElementById('emailInput').value=savedEmail;
      showPortal();
      loadStatus();
    } else {
      showLogin();
    }
  })();
</script>
</body>
</html>
